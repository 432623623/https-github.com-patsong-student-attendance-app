<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Attendance App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: auto;
      }
	  
	#home-link {
		margin-top 20px;
	}
	table {
	  font-family: Arial, Helvetica, sans-serif;
		border-collapse: collapse;
	}
	th {
	  padding: 12px;
	  text-align: left;
	  background-color: grey;
	  border: 1px solid #ddd;
	  color: white;
	}
	td {
		padding: 12px;
		text-align: left;
		border: 1px solid #ddd;
	}

	  .present {
		background-color: #d4edda;
	  }
	  .absent {
		background-color: #f8d7da;
	  }
    </style>
  </head>
  <body>
  	<a href="../" id="home-link">Home</a>

    <h1>Attendance Log</h1>
	<div id="student-list"></div>

	<script>
		const studentList = document.getElementById("student-list");
		function getLocalDateString(date) {
		  const year = date.getFullYear();
		  const month = String(date.getMonth() + 1).padStart(2, '0');
		  const day = String(date.getDate()).padStart(2, '0');
		  return `${year}-${month}-${day}`;
		}
		function getLast7Days(){
		  const days = [];

		  for (let i = 6; i >= 0; i--) {
			const d = new Date();
			d.setDate(d.getDate() - i);
			days.push(getLocalDateString(d));
		  }

		  return days;
		}
		async function loadAttendance(){
		  const res = await fetch("/api/attendance");
		  const data = await res.json();

		  console.log(data);
		  renderAttendance(data);
		}
		function renderAttendance(data){
			studentList.innerHTML = '';
			const dates = getLast7Days();
			const table = document.createElement("table");
			table.border = "1";
			
			let header = "<tr><th>No</th><th>Name</th>";
			dates.forEach(d => header += `<th>${d}</th>`);
			header += "</tr>";
			
			table.innerHTML = header;
			
			const grouped = {};
			
			data.forEach(row =>{
				if(!grouped[row.student_id]){
					grouped[row.student_id] = {
						name: row.name,
						records: {}
					};
				}
				if (row.date){
					grouped[row.student_id].records[row.date] = row.status;
				}
			});
			let index = 1;
			
			for (const student_id in grouped) {
				const student = grouped[student_id];
				const row = document.createElement('tr');
				let rowHTML = `<td>${index++}</td><td>${student.name}</td>`;
				dates.forEach(date =>{
					const status = student.records[date] || "";
					rowHTML +=`
						<td>
							<select class="status-select" 
								onchange="updateAttendance(${student_id}, '${date}', this.value); setColor(this)">
								<option value="">-</option>
								<option value="Present" ${status === "Present" ? "selected" : ""}>Present</option>
								<option value="Absent" ${status === "Absent" ? "selected" : ""}>Absent</option>
							</select>
						</td>
					`;
				});
				row.innerHTML = rowHTML;
				table.appendChild(row);
			}
			studentList.appendChild(table);
			document.querySelectorAll(".status-select").forEach(setColor);
		}
		function setColor(select){
			select.classList.remove("present", "absent");
			if(select.value === "Present"){
				select.classList.add("present");
			} else if (select.value === "Absent"){
				select.classList.add("absent");
			}
		}
		async function updateAttendance(student_id, date, status){
			student_id = Number(student_id);
			const res = await fetch("/api/attendance", {
				method: "POST",
				headers: {"Content-Type": "application/json"},
				body: JSON.stringify({ student_id, date, status })
			});
			const data = await res.json();
			console.log('saved:', data);
		}
		loadAttendance();
	</script>
  </body>
</html>
