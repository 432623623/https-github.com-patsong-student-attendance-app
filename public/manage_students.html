<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Attendance App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: auto;
      }
      #student-form {
        display: flex;
        justify-content: left;
        margin-bottom: 30px;
      }

	table {
	  font-family: Arial, Helvetica, sans-serif;
		border-collapse: collapse;
	}
	th {
	  padding: 12px;
	  text-align: left;
	  background-color: grey;
	  border: 1px solid #ddd;
	  color: white;
	}
	td {
		padding: 12px;
		text-align: left;
		border: 1px solid #ddd;
	}
    </style>
  </head>
  <body>
	<a href="../">Home</a>
    <h1>Manage Students</h1>
    <form id="student-form">
		<input type="text" id="name-input" placeholder="student name" />
		<input type="text" id="birthday-input" placeholder="birthday (YYYY/MM/DD)" />
		<input type="text" id="subject-input" placeholder="subject" />
		<input type="text" id="grade-input" placeholder="grade" />

      <button type="submit">Add</button>
    </form>
    <div id="student-list"></div>

    <script>
      const API_URL = "http://localhost:3000/api/students";

		const studentForm = document.getElementById("student-form");
		const nameInput = document.getElementById("name-input");
		const birthdayInput = document.getElementById("birthday-input");
		const subjectInput = document.getElementById("subject-input");
		const gradeInput = document.getElementById("grade-input");

      const studentList = document.getElementById("student-list");

		studentForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = nameInput.value.trim();
		const birthday = birthdayInput.value.trim();
        const subject = subjectInput.value.trim();
        const grade = gradeInput.value.trim();

        if (name) {
          const student = { name, birthday, subject, grade };
          await createStudent(student);
          nameInput.value = "";
          birthdayInput.value = "";
          subjectInput.value = "";
          gradeInput.value = "";
			console.log('student:', student);
          loadStudents();
        }
      });

      async function loadStudents() {
        const students = await fetchStudents();
        renderStudents(students);
      }

      async function fetchStudents() {
        const response = await fetch(API_URL);
        const students = await response.json();
        return students;
      }

      function renderStudents(students) {
        studentList.innerHTML = "";
		const table = document.createElement('table');
		table.border = '1';
		table.innerHTML = `
			<tr>
				<th>Name</th>
				<th>Birthday</th>
				<th>Subject</th>
				<th>Grade</th>
			</tr>
		`;
        students.forEach((student) => {
          const row = document.createElement("tr");
			row.innerHTML = `
				<td>${student.name}</td>
				<td>${student.birthday}</td>
                <td>${student.subject}</td>
                <td>${student.grade}</td>
				`;
			table.appendChild(row);
        });
		studentList.appendChild(table);
      }

      async function createStudent(student) {
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(student),
          headers: { "Content-Type": "application/json" },
        });
      }

      async function deleteStudent(id) {
        await fetch(`${API_URL}/${id}`, { method: "DELETE" });
        loadStudents();
      }

      async function getStudent(id) {
        const response = await fetch(`${API_URL}/${id}`);
        const student = await response.json();
        return student;
      }

          body: JSON.stringify(student),
          headers: { "Content-Type": "application/json" },
        });
      }
      loadStudents();
    </script>
  </body>
</html>
